# MySQL Docker: hostas 3307 → konteineris 3306 (3306 dažnai užimtas XAMPP / vietinės MySQL).
# Symfony su šiuo DB: DATABASE_URL="mysql://symfony:doc1973@127.0.0.1:3307/GPT-solutions?serverVersion=8.0.32&charset=utf8mb4"
# Paleisti: docker compose up -d db phpmyadmin --remove-orphans
services:
  db:
    platform: linux/x86_64
    image: mysql:8.0
    ports:
      - "3307:3306"
    environment:
      MYSQL_DATABASE: GPT-solutions
      MYSQL_USER: symfony
      MYSQL_PASSWORD: doc1973
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - ./mysql-int:/docker-entrypoint-initdb.d
  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: phpmyadmin-container
    restart: always
    ports:
      - "8081:80"
    environment:
      PMA_HOST: db
      MYSQL_ROOT_PASSWORD: root
    depends_on:
      - db
