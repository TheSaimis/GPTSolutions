services:
  app:
    # Neįterpti Compose env į vietinį `symfony server` (kitaip DATABASE_URL tampa host=database).
    labels:
      com.symfony.server.service-ignore: true
    build: .
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
    environment:
      DATABASE_URL: "mysql://app:app@database:3306/app?serverVersion=8.0&charset=utf8mb4"
      APP_ENV: dev
      LIBREOFFICE_BIN: /usr/bin/soffice
    depends_on:
      database:
        condition: service_healthy

  database:
    labels:
      com.symfony.server.service-ignore: true
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: app
      MYSQL_USER: app
      MYSQL_PASSWORD: app
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - database_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 45s

volumes:
  database_data:
