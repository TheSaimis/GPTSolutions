nelmio_cors:
  defaults:
    allow_origin: ['https://localhost:3000', 'http://localhost:3000', 'http://127.0.0.1:3000', 'https://127.0.0.1:3000']
    allow_methods: ['GET', 'POST', 'PUT', 'PATCH', 'DELETE', 'OPTIONS']
    allow_headers: ['Content-Type', 'Authorization']
    allow_credentials: true
    # Kad naršyklė matytų Content-Disposition (ZIP/Word/PDF pavadinimams iš API)
    expose_headers: ['Content-Disposition', 'Content-Type']
    max_age: 3600

  paths:
    '^/api/':
      allow_origin: ['https://localhost:3000', 'http://localhost:3000', 'http://127.0.0.1:3000', 'https://127.0.0.1:3000']
      allow_methods: ['GET', 'POST', 'PUT', 'PATCH', 'DELETE', 'OPTIONS']
      allow_headers: ['Content-Type', 'Authorization']
      allow_credentials: true
      expose_headers: ['Content-Disposition', 'Content-Type']
      max_age: 3600